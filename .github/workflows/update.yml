name: Update COPR Downloads

on:
  schedule:
    # Daily at 05:30 UTC, ahead of the r-observatory/data merge (~08:00 UTC).
    # Each run snapshots the iucar/cran overview counters and appends one daily
    # data point; the cumulative counters are differenced into per-day deltas.
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: "Re-export every year shard from the full history (after a code change to the aggregation)."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: copr-downloads-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RSQLite
            any::jsonlite
            any::curl
            any::xml2
            any::testthat
            any::withr
      - name: Run unit tests
        run: Rscript tests/testthat.R
      - name: Run update script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPR_FORCE_REBUILD: ${{ inputs.force_full_rebuild }}
        run: |
          mkdir -p out
          Rscript scripts/update.R out/
      - name: Publish changed shards to "current" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view current >/dev/null 2>&1; then
            git tag -f current
            git push -f origin current || true
            gh release create current \
              --title "COPR Downloads (rolling)" \
              --notes-file out/release_notes.md \
              --latest
          fi
          CHANGED=$(jq -r '.changed_shards[]' out/manifest.json)
          for asset in $CHANGED; do
            if [ -f "out/$asset" ]; then
              echo "Uploading $asset..."
              gh release upload current "out/$asset" --clobber
            else
              echo "WARNING: $asset listed in manifest but not present on disk"
            fi
          done
          gh release upload current out/manifest.json --clobber
          gh release edit current --notes-file out/release_notes.md
      - name: Update last run timestamp
        continue-on-error: true
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-updated.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-updated.txt
          git diff --cached --quiet || git commit -m "chore: update last run time"
          git pull --rebase || true
          git push
